<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para mi personita especial ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>
:root {
  --color-fondo-1: #ffd1dc;
  --color-fondo-2: #fff0f5;
  --color-sobre-base: #e8a5b0;
  --color-sobre-solapa: #d7909c;
  --color-sobre-frente: #f3b5c0;
  --color-sello: #b03a2e;
  --color-carta: #ffffff;
  --color-texto: #5a3b40;
}

* { -webkit-tap-highlight-color: transparent; outline: none; }

body {
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, var(--color-fondo-1), var(--color-fondo-2));
  overflow: hidden;
  font-family: 'Playfair Display', serif;
  height: 100vh;
  width: 100vw;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* LLUVIA CONTINUA */
.rain-heart {
  position: fixed;
  top: -20px;
  pointer-events: none;
  z-index: 1;
  animation: fall linear forwards;
}

@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}

.bg-decor {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

.light {
  position: absolute;
  width: 5px; height: 5px;
  background: white;
  border-radius: 50%;
  filter: blur(2px);
  animation: blink 3s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 0.8; transform: scale(1.2); }
}

.bounce-text {
  position: absolute;
  top: -60px;
  width: 100%;
  text-align: center;
  font-family: 'Dancing Script', cursive;
  font-size: 28px;
  color: var(--color-texto);
  animation: bounce 2s infinite;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
}

@keyframes bounce {
  0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
  40% {transform: translateY(-15px);}
  60% {transform: translateY(-7px);}
}

.heart-burst {
  position: fixed;
  pointer-events: none;
  z-index: 1000;
  font-size: 20px;
  animation: burst 0.8s ease-out forwards;
}

@keyframes burst {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
}

/* EL PLUS: DESTELLOS */
.sparkle-trail {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  animation: fade-up 1s ease-out forwards;
}

@keyframes fade-up {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-30px) scale(0.5); }
}

/* SCROLL BONITO */
.letter::-webkit-scrollbar { width: 6px; }
.letter::-webkit-scrollbar-track { background: transparent; }
.letter::-webkit-scrollbar-thumb { 
  background: var(--color-sobre-base); 
  border-radius: 10px; 
}

.viewport {
  position: relative;
  width: 100%;
  max-width: 500px;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2;
}

.envelope-wrapper {
  position: absolute;
  z-index: 10;
  transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s ease;
}

.envelope {
  position: relative;
  width: 300px;
  height: 200px;
  background: var(--color-sobre-base);
  border-radius: 0 0 10px 10px;
  cursor: pointer;
  box-shadow: 0 15px 35px rgba(0,0,0,0.1);
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: var(--color-sobre-solapa);
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transform-origin: top;
  transition: transform 0.6s ease;
  z-index: 5;
}

.front {
  position: absolute;
  width: 100%;
  height: 100%;
  background: var(--color-sobre-frente);
  clip-path: polygon(0 100%, 100% 100%, 100% 0, 50% 60%, 0 0);
  border-radius: 0 0 10px 10px;
  z-index: 4;
}

.wax-seal {
  position: absolute;
  width: 50px;
  height: 50px;
  background: var(--color-sello);
  border-radius: 50%;
  top: 48%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 6;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  transition: opacity 0.4s;
}

.letter {
  position: absolute;
  width: 90%;
  max-width: 350px;
  height: 0;
  background: var(--color-carta);
  background-image: linear-gradient(to bottom, #fff 98%, #f0f0f0 100%);
  border-radius: 8px;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Dancing Script', cursive;
  font-size: clamp(18px, 4.5vw, 22px);
  color: var(--color-texto);
  opacity: 0;
  z-index: 2;
  transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  overflow: hidden;
  text-align: center;
}

.letter.active {
  opacity: 1;
  height: 70vh;
  max-height: 550px;
  padding: 40px 25px;
  transform: translateY(-20px);
  z-index: 20;
  overflow-y: auto;
}

#btnSiguiente {
  display: inline-block;
  margin-top: 25px;
  background: var(--color-sobre-base);
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 25px;
  font-family: 'Dancing Script';
  font-size: 20px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.5s;
}
#btnSiguiente.visible { opacity: 1; }

/* BOTÓN DISIMULADO DE ADELANTAR */
#btnSkip {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: none;
  border: none;
  color: var(--color-texto);
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  opacity: 0.5;
  cursor: pointer;
  z-index: 100;
  transition: opacity 0.3s;
}
#btnSkip:hover { opacity: 1; }

/* CARRUSEL Y BOTONES */
.container {
  opacity: 0;
  transition: opacity 1s;
  pointer-events: none;
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 30;
}
.container.show { opacity: 1; pointer-events: auto; }

.carousel-box {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 500px;
}

.polaroid {
  background: white;
  padding: 12px 12px 35px 12px;
  width: 80%;
  max-width: 320px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
  border-radius: 3px;
  z-index: 2;
}

.img-container { aspect-ratio: 1/1; overflow: hidden; background: #eee; }
.img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }

.nav-btn {
  position: absolute;
  background: white;
  border: none;
  width: 45px; height: 45px;
  border-radius: 50%;
  font-size: 20px;
  color: var(--color-sobre-base);
  cursor: pointer;
  z-index: 40;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  display: flex; align-items: center; justify-content: center;
}

.prev { left: 10px; }
.next { right: 10px; }

@media (min-width: 600px) {
  .prev { left: -40px; }
  .next { right: -40px; }
}

.music-ctrl {
  position: fixed; bottom: 20px; right: 20px;
  background: white; width: 45px; height: 45px;
  border-radius: 50%; display: flex; align-items: center;
  justify-content: center; z-index: 100; cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="bg-decor" id="bgDecor"></div>

<audio id="musica" loop autoplay>
  <source src="Contigo.mp3" type="audio/mpeg">
</audio>

<div class="music-ctrl" onclick="toggleMusic(event)">🎵</div>
<button id="btnSkip" onclick="saltarAnimacion(event)">Adelantar ⏩</button>

<div class="viewport">
  <div class="envelope-wrapper" id="sobreContenedor">
    <div class="bounce-text">¡Ábreme, mi amor! ❤️</div>
    <div class="envelope" onclick="abrirTodo(event)">
      <div class="flap"></div>
      <div class="wax-seal">❤️</div>
      <div class="front"></div>
    </div>
  </div>

  <div class="letter" id="letterScroll">
    <div id="textoCarta"></div>
    <button id="btnSiguiente" onclick="irARegalo(event)">Ver nuestro regalo ✨</button>
  </div>
</div>

<div class="container" id="contenido">
  <div class="carousel-box">
    <button class="nav-btn prev" onclick="manualNav(-1, event)">❮</button>
    <div class="polaroid" id="card">
      <div class="img-container"><img id="foto" src=""></div>
      <div class="text-container" style="text-align: center; margin-top:10px;"><div id="mensaje" style="font-family:'Dancing Script'; font-size:22px;"></div></div>
    </div>
    <button class="nav-btn next" onclick="manualNav(1, event)">❯</button>
  </div>
</div>

<script>
// Forzar música al primer clic si el navegador la bloqueó
document.body.addEventListener('click', () => {
    const m = document.getElementById("musica");
	m.volume = 0.4;
    if(m.paused) m.play();
}, {once: true});

// EL PLUS: DESTELLOS MÁGICOS
function createSparkle(x, y) {
  if(Math.random() > 0.4) return; // Controla que no salgan demasiados
  const s = document.createElement('div');
  s.innerHTML = '✨';
  s.className = 'sparkle-trail';
  s.style.left = x + 'px';
  s.style.top = y + 'px';
  s.style.fontSize = (Math.random() * 10 + 10) + 'px';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 1000);
}
document.addEventListener('mousemove', e => createSparkle(e.clientX, e.clientY));
document.addEventListener('touchmove', e => createSparkle(e.touches[0].clientX, e.touches[0].clientY));

// LLUVIA SIEMPRE
function createRain() {
  const h = document.createElement('div');
  h.className = 'rain-heart';
  h.innerHTML = ['❤️','💖','🌸'][Math.floor(Math.random()*3)];
  h.style.left = Math.random() * 100 + 'vw';
  h.style.fontSize = Math.random() * 10 + 15 + 'px';
  h.style.animationDuration = Math.random() * 3 + 2 + 's';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 5000);
}
setInterval(createRain, 400);

const bg = document.getElementById('bgDecor');
for(let i=0; i<30; i++) {
    const light = document.createElement('div');
    light.className = 'light';
    light.style.left = Math.random() * 100 + '%';
    light.style.top = Math.random() * 100 + '%';
    light.style.animationDelay = Math.random() * 5 + 's';
    bg.appendChild(light);
}

function createBurst(e) {
    if(!e) return;
    const x = e.clientX || (e.touches && e.touches[0].clientX) || window.innerWidth/2;
    const y = e.clientY || (e.touches && e.touches[0].clientY) || window.innerHeight/2;
    for(let i=0; i<15; i++) {
        const h = document.createElement('div');
        h.className = 'heart-burst';
        h.innerHTML = '❤️';
        h.style.left = x + 'px';
        h.style.top = y + 'px';
        h.style.setProperty('--tx', (Math.random()-0.5) * 300 + 'px');
        h.style.setProperty('--ty', (Math.random()-0.5) * 300 + 'px');
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 800);
    }
}

const texto = `Mi amor... 💖\n\nA veces intento encontrar las palabras perfectas, pero contigo aprendí que no hacen falta perfecciones.\n\nEres mi calma en días difíciles y la razón de mis sonrisas.\n\nContigo aprendí que el amor son estos pequeños instantes que se vuelven eternos.\n\nGracias por estar a mi lado. Esto es un pedacito de nuestra historia...`;

let abierta = false;
let timeoutAbrir1, timeoutAbrir2, typingTimeout;

function abrirTodo(e) {
  if (abierta) return;
  abierta = true;
  createBurst(e);
  document.querySelector(".flap").style.transform = "rotateX(180deg)";
  document.querySelector(".wax-seal").style.opacity = "0";
  document.querySelector(".bounce-text").style.display = "none";
  
  timeoutAbrir1 = setTimeout(() => {
    document.getElementById("sobreContenedor").style.transform = "translateY(300px)";
    document.getElementById("letterScroll").classList.add("active");
  }, 600);
  
  timeoutAbrir2 = setTimeout(() => { 
    escribirTexto(document.getElementById("textoCarta"), texto, 60); 
  }, 1600);
}

function escribirTexto(el, text, speed) {
  let i = 0;
  function write() {
    if (i < text.length) {
      el.innerHTML += text[i] === "\n" ? "<br>" : text[i];
      i++;
      document.getElementById("letterScroll").scrollTop = document.getElementById("letterScroll").scrollHeight;
      typingTimeout = setTimeout(write, speed);
    } else {
      setTimeout(() => {
        document.getElementById("btnSiguiente").classList.add("visible");
        document.getElementById("btnSkip").style.display = "none"; // Se esconde al terminar
      }, 800);
    }
  }
  write();
}

// FUNCIÓN PARA EL BOTÓN DISIMULADO
function saltarAnimacion(e) {
  if(e) e.stopPropagation();
  
  // Limpiamos los tiempos para que no se sobrepongan
  clearTimeout(timeoutAbrir1);
  clearTimeout(timeoutAbrir2);
  clearTimeout(typingTimeout);
  
  abierta = true;
  
  // Estado final de la carta
  document.querySelector(".flap").style.transform = "rotateX(180deg)";
  document.querySelector(".wax-seal").style.opacity = "0";
  document.querySelector(".bounce-text").style.display = "none";
  
  document.getElementById("sobreContenedor").style.transform = "translateY(300px)";
  document.getElementById("letterScroll").classList.add("active");
  document.getElementById("letterScroll").style.transition = "none"; // Quitar transición para que sea inmediato
  
  // Imprimir texto de golpe
  document.getElementById("textoCarta").innerHTML = texto.replace(/\n/g, '<br>');
  document.getElementById("btnSiguiente").classList.add("visible");
  document.getElementById("btnSkip").style.display = "none";
}

function irARegalo(e) {
  createBurst(e);
  document.querySelector(".viewport").style.opacity = "0";
  document.getElementById("btnSkip").style.display = "none";
  setTimeout(() => {
    document.querySelector(".viewport").style.display = "none";
    document.getElementById("contenido").classList.add("show");
    actualizarFoto();
    startAuto();
  }, 1000);
}

function toggleMusic(e) {
  if(e) e.stopPropagation();
  const m = document.getElementById("musica");
  m.paused ? m.play() : m.pause();
}

let fotos = ["foto2.JPEG","foto1.JPEG",  "foto3.JPEG","foto7.JPEG", "foto6.JPEG","foto13.JPEG", "foto10.JPEG", "foto9.JPEG", "Cuenca.jpg","esp.webp"];
  let mensajes = [
    "Para mi amorcito ❤️",
    "Eres mi lugar favorito 🌍",
    "❤️ La primera vez que nos conocimos ❤️",
	"Por más San Valentín juntos ❤️",
	"Me encanta tu sonrisa y tu sazón 💕",
	"Desde que te conozco siento que nada es imposible 💕",
	"Eres mi vida y mi todo 💕",
	"Por más locuras juntos 💕",
	"Nuestros planes a futuro 💕",
	"Te amo hoy mañana y siempre 💖",
  ];
let idx = 0;
let timer;
let timeoutFoto; 

function actualizarFoto() {
  const img = document.getElementById("foto");
  img.style.opacity = "0";
  clearTimeout(timeoutFoto); 
  timeoutFoto = setTimeout(() => {
    img.src = fotos[idx];
    document.getElementById("mensaje").innerText = mensajes[idx];
    img.style.opacity = "1";
  }, 400);
}

function startAuto() {
  clearInterval(timer);
  timer = setInterval(() => {
    idx = (idx + 1) % fotos.length;
    actualizarFoto();
  }, 5000);
}

function manualNav(n, e) {
  if(e) e.stopPropagation(); 
  createBurst(e); 
  clearInterval(timer); 
  idx = (idx + n + fotos.length) % fotos.length;
  actualizarFoto();
  startAuto(); 
}
</script>
</body>
</html>
